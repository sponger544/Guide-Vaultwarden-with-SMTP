services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      DOMAIN: "https://vw.domain.com"
    volumes:
      - ./vw-data/:/data/
    ports:
      - 8000:80
    networks:
      - tunnel-net
      
networks:
  tunnel-net:
    name: tunnel-net
    external: true
